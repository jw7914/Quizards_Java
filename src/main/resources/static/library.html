<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Study Sets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background:
                radial-gradient(circle at top, rgba(13, 110, 253, 0.10), transparent 28%),
                linear-gradient(180deg, #f8fafc 0%, #edf3f8 100%);
            min-height: 100vh;
        }

        .deck-item + .deck-item {
            margin-top: 0.9rem;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/">Quizards</a>
        <div class="d-flex gap-2 align-items-center">
            <span id="session-summary" class="text-secondary small">Checking session...</span>
            <a class="btn btn-outline-secondary" href="/">Home</a>
            <a class="btn btn-outline-secondary" href="/create.html">Create</a>
            <a class="btn btn-outline-secondary" href="/auth.html">Auth</a>
            <button id="logout-button" class="btn btn-outline-danger d-none" type="button">Log out</button>
        </div>
    </div>
</nav>

<main class="container py-5">
    <section class="row justify-content-center">
        <div class="col-xl-9">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-md-5">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <h1 class="h3 mb-1">My Saved Study Sets</h1>
                            <p class="text-secondary mb-0">All study sets saved under your account, including AI-generated decks.</p>
                        </div>
                        <button id="refresh-button" class="btn btn-outline-secondary btn-sm" type="button">Refresh</button>
                    </div>

                    <div id="loading-state" class="text-secondary small mb-3">Loading your study sets...</div>
                    <div id="study-set-list"></div>
                </div>
            </div>
        </div>
    </section>
</main>

<script>
    const sessionSummary = document.getElementById("session-summary");
    const logoutButton = document.getElementById("logout-button");
    const loadingState = document.getElementById("loading-state");
    const studySetList = document.getElementById("study-set-list");
    const refreshButton = document.getElementById("refresh-button");

    async function fetchJson(url, options = {}) {
        const response = await fetch(url, {
            headers: {
                "Content-Type": "application/json",
                ...(options.headers || {})
            },
            ...options
        });

        let body = null;
        const contentType = response.headers.get("content-type") || "";
        if (contentType.includes("application/json")) {
            body = await response.json();
        }

        if (!response.ok) {
            throw new Error(body?.error || "Request failed.");
        }

        return body;
    }

    function renderStudySets(studySets) {
        studySetList.innerHTML = "";

        if (!studySets.length) {
            studySetList.innerHTML = `
                <div class="alert alert-light border mb-0">
                    You have not saved any study sets yet.
                </div>
            `;
            return;
        }

        studySets.forEach((studySet) => {
            const article = document.createElement("article");
            article.className = "deck-item card border";
            article.innerHTML = `
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start gap-3">
                        <div>
                            <h2 class="h5 mb-1">${studySet.title}</h2>
                            <p class="text-secondary mb-2">${studySet.description}</p>
                        </div>
                        <span class="badge text-bg-${studySet.visibility === "PUBLIC" ? "success" : "secondary"}">${studySet.visibility}</span>
                    </div>
                    <div class="small text-secondary">ID: ${studySet.id}</div>
                    <div class="small text-secondary mt-1">${studySet.flashcardCount} flashcard${studySet.flashcardCount === 1 ? "" : "s"}</div>
                    <div class="mt-3">
                        <a class="btn btn-outline-primary btn-sm" href="/study-set.html?id=${studySet.id}">Open Study Set</a>
                    </div>
                </div>
            `;
            studySetList.appendChild(article);
        });
    }

    async function refreshSession() {
        const me = await fetchJson("/api/auth/me");
        if (!me.authenticated) {
            window.location.href = "/auth.html";
            return;
        }

        sessionSummary.textContent = `Logged in as ${me.username}`;
        logoutButton.classList.remove("d-none");
    }

    async function loadMyStudySets() {
        loadingState.textContent = "Loading your study sets...";
        const studySets = await fetchJson("/api/my/study-sets");
        renderStudySets(studySets);
        loadingState.textContent = `${studySets.length} saved study set${studySets.length === 1 ? "" : "s"} loaded.`;
    }

    logoutButton.addEventListener("click", async () => {
        await fetch("/api/auth/logout", { method: "POST" });
        window.location.href = "/auth.html";
    });

    refreshButton.addEventListener("click", () => {
        loadMyStudySets().catch(() => {
            loadingState.textContent = "Unable to load your study sets.";
        });
    });

    Promise.resolve()
        .then(refreshSession)
        .then(loadMyStudySets)
        .catch(() => {
            window.location.href = "/auth.html";
        });
</script>
</body>
</html>
