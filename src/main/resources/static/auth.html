<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quizards Auth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background: linear-gradient(180deg, #f8fafc 0%, #edf2f7 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/">Quizards</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" href="/">Home</a>
            <a class="btn btn-outline-secondary" href="/library.html">My Study Sets</a>
            <a class="btn btn-primary" href="/create.html">Create</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <section class="row justify-content-center mb-4">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h1 class="h2 mb-1">Login or Register</h1>
                            <p class="text-secondary mb-0">Create an account first, then move into the study-set workspace.</p>
                        </div>
                        <div id="session-summary" class="text-end text-secondary">Checking session...</div>
                    </div>
                    <button id="logout-button" class="btn btn-outline-danger btn-sm mt-3 d-none" type="button">Log out</button>
                </div>
            </div>
        </div>
    </section>

    <section class="row g-4 justify-content-center">
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body p-4">
                    <h2 class="h4 mb-3">Register</h2>
                    <form id="register-form" class="row g-3">
                        <div class="col-12">
                            <label for="register-username" class="form-label">Username</label>
                            <input id="register-username" name="username" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label for="register-password" class="form-label">Password</label>
                            <input id="register-password" name="password" type="password" class="form-control" minlength="8" required>
                        </div>
                        <div class="col-12 d-grid">
                            <button type="submit" class="btn btn-success btn-lg">Create Account</button>
                        </div>
                    </form>
                    <div id="register-status" class="alert alert-secondary mt-3 mb-0 d-none"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body p-4">
                    <h2 class="h4 mb-3">Log In</h2>
                    <form id="login-form" class="row g-3">
                        <div class="col-12">
                            <label for="login-username" class="form-label">Username</label>
                            <input id="login-username" name="username" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label for="login-password" class="form-label">Password</label>
                            <input id="login-password" name="password" type="password" class="form-control" required>
                        </div>
                        <div class="col-12 d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Log In</button>
                        </div>
                    </form>
                    <div id="login-status" class="alert alert-secondary mt-3 mb-0 d-none"></div>
                </div>
            </div>
        </div>
    </section>
</main>

<script>
    const registerForm = document.getElementById("register-form");
    const loginForm = document.getElementById("login-form");
    const registerStatus = document.getElementById("register-status");
    const loginStatus = document.getElementById("login-status");
    const sessionSummary = document.getElementById("session-summary");
    const logoutButton = document.getElementById("logout-button");

    function showStatus(element, message, tone) {
        element.className = `alert mt-3 mb-0 alert-${tone}`;
        element.textContent = message;
    }

    async function fetchJson(url, options = {}) {
        const response = await fetch(url, {
            headers: {
                "Content-Type": "application/json",
                ...(options.headers || {})
            },
            ...options
        });

        let body = null;
        const contentType = response.headers.get("content-type") || "";
        if (contentType.includes("application/json")) {
            body = await response.json();
        }

        if (!response.ok) {
            throw new Error(body?.error || "Request failed.");
        }

        return body;
    }

    async function refreshSession() {
        const me = await fetchJson("/api/auth/me");
        if (me.authenticated) {
            sessionSummary.textContent = `Logged in as ${me.username}`;
            logoutButton.classList.remove("d-none");
        } else {
            sessionSummary.textContent = "Not logged in";
            logoutButton.classList.add("d-none");
        }
    }

    registerForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        showStatus(registerStatus, "Creating account...", "secondary");
        try {
            await fetchJson("/api/auth/register", {
                method: "POST",
                body: JSON.stringify({
                    username: registerForm.username.value,
                    password: registerForm.password.value
                })
            });
            showStatus(registerStatus, "Account created. Redirecting to workspace...", "success");
            setTimeout(() => window.location.href = "/create.html", 800);
        } catch (error) {
            showStatus(registerStatus, error.message, "danger");
        }
    });

    loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        showStatus(loginStatus, "Logging in...", "secondary");
        try {
            await fetchJson("/api/auth/login", {
                method: "POST",
                body: JSON.stringify({
                    username: loginForm.username.value,
                    password: loginForm.password.value
                })
            });
            showStatus(loginStatus, "Logged in. Redirecting to workspace...", "success");
            setTimeout(() => window.location.href = "/create.html", 800);
        } catch (error) {
            showStatus(loginStatus, error.message, "danger");
        }
    });

    logoutButton.addEventListener("click", async () => {
        await fetch("/api/auth/logout", { method: "POST" });
        await refreshSession();
        showStatus(loginStatus, "Logged out.", "secondary");
    });

    refreshSession().catch(() => {
        sessionSummary.textContent = "Unable to check session";
    });
</script>
</body>
</html>
