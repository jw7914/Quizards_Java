spring.config.import=optional:file:.env[.properties]
app.name=quizards
quizards.ai.gemini.api-key=${GEMINI_API_KEY:}
spring.datasource.url=${SUPABASE_DB_URL:}
spring.datasource.username=${SUPABASE_DB_USERNAME:}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:0}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT_MS:10000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MS:30000}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.data-source-properties.ApplicationName=${DB_APPLICATION_NAME:quizards}
spring.datasource.hikari.data-source-properties.prepareThreshold=0

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
